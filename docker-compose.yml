services:
  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: genai-blockchain-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: genai_blockchain
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - genai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: genai-blockchain-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - genai-network
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Educational Content Ingestion Service
  ingest:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: genai-blockchain-ingest
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=blockchain_education
      - VECTOR_STORE=qdrant
      - HF_HOME=/app/models/huggingface
      - HF_HUB_DISABLE_SYMLINKS=1
    volumes:
      - ./src:/app/src
      - ./backend:/app/backend
      - ./data:/app/data
      - ./models:/app/models
      - hf_cache:/app/models/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - genai-network
    restart: "no"
    command: python src/ingest_education.py

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: genai-blockchain-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://admin:password123@mongo:27017
      - MONGO_DB=genai_blockchain
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - ENV=production
      - DISABLE_RERANKER=${DISABLE_RERANKER:-true}
      # Auth
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Qdrant & Vector Store
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=blockchain_education
      - VECTOR_STORE=${VECTOR_STORE:-qdrant}
      - HF_HOME=/app/models/huggingface
      - HF_HUB_DISABLE_SYMLINKS=1
      # RAG
      - RAG_MODE=${RAG_MODE:-agentic}
      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - ./src:/app/src
      - ./backend:/app/backend
      - ./data:/app/data
      - ./models:/app/models
      - hf_cache:/app/models/huggingface
    depends_on:
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    networks:
      - genai-network
    restart: unless-stopped
    # GPU support (uncomment if NVIDIA GPU + CUDA available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # Frontend (Vite React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: genai-blockchain-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - genai-network
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: genai-blockchain-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      # Uncomment for SSL
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - genai-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  mongo_data:
  mongo_config:
  qdrant_data:
  hf_cache:

networks:
  genai-network:
    driver: bridge
