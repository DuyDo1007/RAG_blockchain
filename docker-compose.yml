services:
  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: genai-blockchain-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: genai_blockchain
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - genai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: genai-blockchain-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://admin:password123@mongo:27017
      - MONGO_DB=genai_blockchain
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - ENV=production
    volumes:
      - ./src:/app/src
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - genai-network
    restart: unless-stopped
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # Frontend (Optional - for local development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:8000/api
    container_name: genai-blockchain-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000/api
    depends_on:
      - backend
    networks:
      - genai-network
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  mongo_data:
  mongo_config:

networks:
  genai-network:
    driver: bridge
